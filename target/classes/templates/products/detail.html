<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Product Management'">Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #e0f0ff 0, #f8f9ff 40%, #f9fafb 100%);
            padding: 24px 0;
        }

        .navbar {
            background: linear-gradient(90deg, #4f46e5, #7c3aed) !important;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.35);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.03em;
        }

        .page-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        .container-main {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow:
                0 18px 45px rgba(15, 23, 42, 0.18),
                0 0 0 1px rgba(148, 163, 184, 0.15);
            margin-top: 26px;
            margin-bottom: 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .page-title {
            font-size: 1.6rem;
            color: #111827;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            color: #4f46e5;
        }
        .detail-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        .detail-section:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: 600;
            color: #4f46e5;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .detail-value {
            font-size: 1.25rem;
            color: #333;
            font-weight: 500;
        }
        .badge {
            padding: 8px 15px;
            font-size: 1rem;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 140px;
        }
        .product-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.24);
        }
        .price-section {
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow:
                0 10px 24px rgba(15, 23, 42, 0.10),
                0 0 0 1px rgba(148, 163, 184, 0.18);
        }

        .btn-secondary,
        .btn-warning,
        .btn-danger {
            border-radius: 999px;
        }

        footer {
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🛍️ Product Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/products">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products/create">Create New</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
    <!-- Main Container -->
    <div class="container-main">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-cube"></i> Product Details
            </h1>
            <a href="/products" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>

        <!-- Product Details -->
        <div th:if="${product != null}">
            <!-- Product Image -->
            <div th:if="${product.image != null and product.image != ''}" class="detail-section">
                <img th:src="${product.image}" 
                     alt="Product Image" 
                     class="product-image"
                     onerror="this.style.display='none'"/>
            </div>

            <!-- Product Name -->
            <div class="detail-section">
                <div class="detail-label">
                    <i class="fas fa-cube"></i> Product Name
                </div>
                <div class="detail-value" th:text="${product.name}"></div>
            </div>

            <!-- Price -->
            <div class="detail-section">
                <div class="detail-label">
                    <i class="fas fa-dollar-sign"></i> Price
                </div>
                <div class="price-section">
                    <div class="detail-value text-success js-price"
                         th:attr="data-price=${product.price}"
                         th:text="${product.price} + ' đ'"></div>
                </div>
            </div>

            <!-- Category -->
            <div class="detail-section">
                <div class="detail-label">
                    <i class="fas fa-tag"></i> Category
                </div>
                <div>
                    <span class="badge bg-warning text-dark" th:text="${product.categoryName}"></span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-lg">
                    <i class="fas fa-edit"></i> Edit
                </a>
                <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="flex: 1; min-width: 140px;">
                    <button type="submit" class="btn btn-danger btn-lg w-100" onclick="return confirm('Are you sure you want to delete this product?');">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </form>
                <a href="/products" class="btn btn-secondary btn-lg">
                    <i class="fas fa-list"></i> Back to List
                </a>
            </div>
        </div>

        <!-- Error State -->
        <div th:if="${product == null}" class="alert alert-warning" role="alert">
            <i class="fas fa-exclamation-triangle"></i> Product not found!
        </div>
    </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-muted py-4">
        <p>&copy; 2025 - Product Management Application - Developed with Spring Boot & Thymeleaf</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const formatVnd = (value) => {
            const n = Number(value);
            if (!Number.isFinite(n)) return value;
            return new Intl.NumberFormat('vi-VN', { maximumFractionDigits: 0 }).format(n);
        };
        document.querySelectorAll('.js-price').forEach(el => {
            const raw = el.getAttribute('data-price');
            el.textContent = `${formatVnd(raw)} đ`;
        });
    </script>
</body>
</html>
